openapi: 3.1.0
info:
  title: School MIS API
  version: 1.0.0
  description: Starter OpenAPI contract for the Laravel high school MIS backend.
servers:
  - url: http://localhost:8000/api/v1
paths:
  /auth/login:
    post:
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
  /students:
    get:
      summary: List students
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Student collection
    post:
      summary: Create student
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Student created
  /students/{id}:
    get:
      summary: Show student profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student profile
  /students/{id}/report-card:
    get:
      summary: Get report card snapshot
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report card data
  /staff:
    get:
      summary: List staff members
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Staff collection
  /academic-years:
    get:
      summary: List academic years
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Academic years
  /assessments:
    get:
      summary: List assessments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assessment collection
  /finance/reports/collections:
    get:
      summary: Daily collections summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Aggregated payment totals
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
