services:
  app:
    build:
      context: .
    container_name: school_mis_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: school_mis_db
    environment:
      POSTGRES_DB: school_mis
      POSTGRES_USER: school_mis
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
